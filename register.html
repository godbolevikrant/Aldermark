<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — Aldermark</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/style.css" rel="stylesheet">
</head>
<body>

<div class="auth-wrap">

  <!-- LEFT — brand panel -->
  <div class="auth-side">
    <div class="auth-brand">Alder<span>mark</span></div>
    <div>
      <p class="auth-quote">“We take roughly one in four enquiries. Capacity, not headcount, is the product.”</p>
      <p class="auth-meta mt-3">— D. OKAFOR, PARTNER, CAPITAL</p>
    </div>
    <p class="auth-meta">© 2026 Aldermark Advisory LLP</p>
  </div>

  <!-- RIGHT — form -->
  <div class="auth-form-col">
    <div class="auth-form-card">
      <a href="index.html" class="d-lg-none d-inline-block mb-4" style="font-family:var(--font-display);font-size:1.4rem;color:var(--ink);">Alder<span style="color:var(--gold);">mark</span></a>
      <span class="eyebrow">Create an Account</span>
      <h2 class="mt-3 mb-2">Set up your access</h2>
      <p class="lede mb-4">For active and prospective clients of Aldermark Advisory.</p>

      <form class="form-aldermark" novalidate>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="regFirst">First Name</label>
            <input type="text" class="form-control" id="regFirst" placeholder="Jordan" required>
          </div>
          <div class="col-md-6">
            <label for="regLast">Last Name</label>
            <input type="text" class="form-control" id="regLast" placeholder="Achebe" required>
          </div>
          <div class="col-12">
            <label for="regEmail">Email</label>
            <input type="email" class="form-control" id="regEmail" placeholder="jordan@company.com" required>
          </div>
          <div class="col-12">
            <label for="regCompany">Company</label>
            <input type="text" class="form-control" id="regCompany" placeholder="Company name">
          </div>
          <div class="col-12">
            <label for="regPassword">Password</label>
            <input type="password" class="form-control" id="regPassword" placeholder="At least 8 characters" required>
          </div>
          <div class="col-12">
            <label for="regConfirm">Confirm Password</label>
            <input type="password" class="form-control" id="regConfirm" placeholder="Re-enter password" required>
          </div>
          <div class="col-12">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" id="terms" required>
              <label class="form-check-label" for="terms" style="font-family:var(--font-body);font-size:0.88rem;text-transform:none;letter-spacing:0;color:var(--charcoal);">
                I agree to the <a href="#" style="color:var(--ink);font-weight:600;">Terms</a> and <a href="#" style="color:var(--ink);font-weight:600;">Privacy Policy</a>.
              </label>
            </div>
          </div>
          <div class="col-12 mt-1">
            <button type="submit" class="btn-gold border-0 w-100 mb-3">Create Account</button>
            <p class="text-center" style="font-size:0.92rem;color:#5B5E60;">Already have an account? <a href="login.html" style="color:var(--ink);font-weight:600;">Log in</a></p>
          </div>
        </div>
      </form>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
